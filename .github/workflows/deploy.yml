name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Minify CSS
        run: |
          npx clean-css-cli assets/css/base.css assets/css/layout.css assets/css/components.css -o dist/assets/css/main.min.css

      - name: Minify JS
        run: |
          npx terser assets/js/scroll-anim.js assets/js/stack-tabs.js assets/js/countdown.js --compress --mangle --output dist/assets/js/main.min.js

      - name: Copy HTML and static files
        run: |
          cp index.html dist/index.html
          cp sitemap.xml dist/sitemap.xml
          cp robots.txt dist/robots.txt

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
